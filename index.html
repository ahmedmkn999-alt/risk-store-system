<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0f0f11"/>
  <meta name="description" content="نظام كاشير متكامل لمحلات الملابس"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CLOTH POS"/>
  <link rel="manifest" href="manifest.json"/>
  <title>CLOTH POS — كاشير محل الملابس</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc, updateDoc, query,
      where, getDoc, setDoc, onSnapshot, enableIndexedDbPersistence, deleteDoc, orderBy, limit
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    /* ───────── CONFIG — غيّر هنا بياناتك ───────── */
    const firebaseConfig = {
      apiKey: "AIzaSyDwMOax-amBzEm3FDjXKN8yBbB3cXNbb14",
      authDomain: "taskhub-9d282.firebaseapp.com",
      projectId: "taskhub-9d282",
      storageBucket: "taskhub-9d282.firebasestorage.app",
      messagingSenderId: "981675153894",
      appId: "1:981675153894:web:380c4194bb4ea9e1f51e27"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    try { enableIndexedDbPersistence(db).catch(()=>{}); } catch(e){}

    /* ───────── GLOBALS ───────── */
    const COLORS  = ["أحمر","أسود","أبيض","أزرق","أخضر","أصفر","رمادي","بني","بيج","زيتي","وردي","بنفسجي","برتقالي","سكري","نيلي"];
    const SIZES   = ["XS","S","M","L","XL","XXL","3XL","فري سايز"];
    const SECTIONS= ["تيشرتات","بناطيل","شورتات","هوديز","جاكيتات","بلوزات","فساتين","جوارب","إكسسوارات","أخرى"];

    /* ───────── UTILS ───────── */
    const fmt   = n => `${(+n||0).toFixed(2)} ج`;
    const today = () => new Date().toISOString().split("T")[0];
    const nowStr= () => new Date().toLocaleString("ar-EG");
    const genInv= () => `INV-${new Date().getFullYear()}-${String(Date.now()).slice(-6)}`;

    /* ───────── STATE ───────── */
    let state = {
      screen: "pos",
      authed: false,
      products: [],
      invoices: [],
      settings: { storeName:"محل الملابس", storeAddress:"", storePhone:"", password:"1234" },
      cart: [],
      discount: "",
      paid: "",
      search: "",
      filterSection: "",
      invSearch: "",
      invFilter: { type:"all", dateFrom:"", dateTo:"", searchTerm:"" },
      returnStep: "search",
      returnInvoice: null,
      returnSelected: [],
      returnNewItems: [],
      returnPin: "",
      modal: null,         /* { type, data } */
      toast: "",
      reportRange: "today",
      reportData: null,
      loading: true,
      saving: false,
      invPage: 1,
      lowStockThreshold: 3,
    };

    let toastTimer;
    function toast(msg){ state.toast=msg; render(); clearTimeout(toastTimer); toastTimer=setTimeout(()=>{state.toast="";render();},2800); }
    function setState(patch){ Object.assign(state, typeof patch==="function"?patch(state):patch); render(); }

    /* ───────── FIREBASE LISTENERS ───────── */
    function startListeners(){
      onSnapshot(collection(db,"products"), snap=>{
        state.products = snap.docs.map(d=>({id:d.id,...d.data()}));
        render();
      });
      getDoc(doc(db,"settings","main")).then(s=>{
        if(s.exists()) Object.assign(state.settings, s.data());
        state.loading = false;
        render();
      }).catch(()=>{ state.loading=false; render(); });
    }

    /* ───────── LOGIN ───────── */
    function renderLogin(){
      const pin = state.pin||"";
      const err = state.pinErr||false;
      return `
      <div class="login-wrap">
        <div style="text-align:center">
          <div style="font-size:52px;margin-bottom:8px">👕</div>
          <div class="logo-text">CLOTH · POS</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px">${state.settings.storeName}</div>
        </div>
        <div class="pin-display">${"●".repeat(pin.length)}</div>
        ${err?`<div class="alert alert-red">❌ باسورد غلط، حاول تاني</div>`:""}
        <div class="pin-grid">
          ${["1","2","3","4","5","6","7","8","9","","0","del"].map((k,i)=>
            k===""?`<div></div>`:
            `<button class="pin-btn" onclick="handlePin('${k}')">${k==="del"?"⌫":k}</button>`
          ).join("")}
        </div>
        <div style="color:var(--muted);font-size:12px;text-align:center">أدخل PIN للدخول</div>
      </div>`;
    }

    window.handlePin = async (k) => {
      if(k==="del"){ state.pin=(state.pin||"").slice(0,-1); state.pinErr=false; render(); return; }
      const next = (state.pin||"")+k;
      state.pin = next;
      if(next.length>=4){
        const stored = state.settings.password||"1234";
        if(next===stored){ state.authed=true; state.pin=""; state.pinErr=false; startListeners(); }
        else { state.pinErr=true; state.pin=""; }
      }
      render();
    };

    /* ───────── HEADER & NAV ───────── */
    const TABS=[
      {id:"pos",icon:"🛒",label:"الكاشير"},
      {id:"invoices",icon:"📋",label:"الفواتير"},
      {id:"returns",icon:"↩️",label:"مرتجعات"},
      {id:"inventory",icon:"📦",label:"المخزن"},
      {id:"reports",icon:"📊",label:"تقارير"},
      {id:"settings",icon:"⚙️",label:"إعدادات"},
    ];

    function renderHeader(){
      return `
      <div class="header">
        <div class="logo-text" style="letter-spacing:2px">CLOTH·POS</div>
        <div style="font-size:14px;font-weight:600">${state.settings.storeName}</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${new Date().toLocaleDateString("ar-EG")}</div>
      </div>
      <div class="nav" id="nav">
        ${TABS.map(t=>`<button class="nav-btn ${state.screen===t.id?"active":""}" onclick="setScreen('${t.id}')">
          <span class="nav-icon">${t.icon}</span>${t.label}
        </button>`).join("")}
      </div>`;
    }

    window.setScreen = (s) => { state.screen=s; render(); };

    /* ═══════════════════════════════════════════
       POS SCREEN
    ═══════════════════════════════════════════ */
    function renderPOS(){
      const {products, cart, search, discount, paid} = state;
      const filtered = search.length>=1
        ? products.filter(p=>p.name?.includes(search)||p.barcode?.includes(search)||p.section?.includes(search))
        : products.slice(0,24);
      const subtotal = cart.reduce((s,i)=>s+i.total,0);
      const disc = parseFloat(discount)||0;
      const total= Math.max(0,subtotal-disc);
      const paidN= parseFloat(paid)||0;
      const change= paidN-total;

      return `
      <div class="screen">
        <div class="pos-layout">
          <!-- PRODUCTS -->
          <div>
            <div class="card">
              <input class="inp barcode-inp" id="posSearch" placeholder="🔍 بحث باسم أو باركود أو قسم..." value="${escHtml(search)}" oninput="posSearch(this.value)" autocomplete="off"/>
              <div class="product-grid" style="margin-top:12px">
                ${filtered.length===0?`<div class="text-muted" style="grid-column:1/-1;padding:20px;text-align:center">مفيش منتجات</div>`:""}
                ${filtered.map(p=>{
                  const totalQ=(p.variants||[]).reduce((s,v)=>s+v.qty,0);
                  return `<div class="product-card" onclick="openVariantModal('${p.id}')">
                    <div class="product-name">${escHtml(p.name)}</div>
                    <div class="product-price">${fmt(p.salePrice)}</div>
                    <div class="product-section">${escHtml(p.section||"")} · ${totalQ} قطعة</div>
                  </div>`;
                }).join("")}
              </div>
            </div>
          </div>
          <!-- CART -->
          <div>
            <div class="card">
              <div class="section-title">🛒 السلة (${cart.length})</div>
              ${cart.length===0?`<div class="text-muted" style="text-align:center;padding:20px">السلة فاضية</div>`:""}
              ${cart.map((item,i)=>`
                <div class="cart-item">
                  <button class="btn btn-ghost btn-icon btn-sm" onclick="removeFromCart(${i})">✕</button>
                  <div class="cart-item-info">
                    <div class="cart-item-name">${escHtml(item.name)}</div>
                    <div class="cart-item-meta">${escHtml(item.color)} · ${escHtml(item.size)}</div>
                  </div>
                  <div class="qty-ctrl">
                    <button class="qty-btn" onclick="updateCartQty(${i},-1)">−</button>
                    <span class="qty-num">${item.qty}</span>
                    <button class="qty-btn" onclick="updateCartQty(${i},1)">+</button>
                  </div>
                  <div class="cart-item-price">${fmt(item.total)}</div>
                </div>`).join("")}
              ${cart.length>0?`
                <div class="divider"></div>
                <div class="total-row"><span class="total-label">المجموع الفرعي</span><span class="total-val">${fmt(subtotal)}</span></div>
                <div class="field mt-8"><label>خصم (جنيه)</label>
                  <input class="inp" type="number" placeholder="0" value="${escHtml(discount)}" oninput="setState({discount:this.value})"/>
                </div>
                ${disc>0?`<div class="total-row"><span class="total-label">الخصم</span><span class="total-val text-red">-${fmt(disc)}</span></div>`:""}
                <div class="total-row main"><span>الإجمالي</span><span>${fmt(total)}</span></div>
                <div class="field mt-8"><label>المبلغ المستلم</label>
                  <input class="inp" type="number" placeholder="0.00" value="${escHtml(paid)}" oninput="setState({paid:this.value})"/>
                </div>
                ${paidN>0?`<div class="change-display ${change<0?"neg":""}">${change>=0?`الباقي للعميل: ${fmt(change)}`:`ناقص: ${fmt(-change)}`}</div>`:""}
                <button class="btn btn-primary btn-block mt-12" onclick="confirmSale()" ${state.saving?"disabled":""}>
                  ${state.saving?"⏳ جاري الحفظ...":"✅ تأكيد وطباعة"}
                </button>
                <button class="btn btn-ghost btn-block mt-8" onclick="clearCart()" style="color:var(--red)">🗑️ مسح السلة</button>
              `:""}
            </div>
          </div>
        </div>
      </div>`;
    }

    window.posSearch = (v) => { state.search=v; render(); };
    window.clearCart = () => { if(confirm("هتمسح السلة؟")) { state.cart=[]; state.discount=""; state.paid=""; render(); }};
    window.removeFromCart = (i) => { state.cart=state.cart.filter((_,j)=>j!==i); render(); };
    window.updateCartQty = (i,d) => {
      state.cart = state.cart.map((item,j)=>{
        if(j!==i) return item;
        const nq=item.qty+d;
        if(nq<=0) return null;
        if(nq>item.maxQty){ toast("⚠️ الحد الأقصى "+item.maxQty+" قطعة"); return item; }
        return {...item,qty:nq,total:item.price*nq};
      }).filter(Boolean);
      render();
    };
    window.openVariantModal = (id) => {
      const p = state.products.find(p=>p.id===id);
      if(!p) return;
      state.modal = { type:"variant", data:{product:p, color:"", size:""} };
      render();
    };
    window.selectColor = (c) => { state.modal.data.color=c; state.modal.data.size=""; render(); };
    window.selectSize  = (s) => { state.modal.data.size=s; render(); };
    window.addToCartFromModal = () => {
      const {product,color,size} = state.modal.data;
      const v = (product.variants||[]).find(vv=>vv.color===color&&vv.size===size);
      if(!v||v.qty<=0){ toast("❌ المقاس ده خلص"); return; }
      const idx = state.cart.findIndex(i=>i.productId===product.id&&i.color===color&&i.size===size);
      if(idx>=0){
        if(state.cart[idx].qty>=v.qty){ toast("⚠️ الكمية المتاحة "+v.qty+" فقط"); return; }
        state.cart = state.cart.map((i,j)=>j===idx?{...i,qty:i.qty+1,total:i.price*(i.qty+1)}:i);
      } else {
        state.cart = [...state.cart, {productId:product.id,name:product.name,color,size,price:product.salePrice,qty:1,total:product.salePrice,maxQty:v.qty}];
      }
      state.modal=null;
      toast("✅ تمت الإضافة");
    };
    window.confirmSale = async () => {
      if(!state.cart.length){ toast("⚠️ السلة فاضية"); return; }
      state.saving=true; render();
      try{
        const subtotal=state.cart.reduce((s,i)=>s+i.total,0);
        const disc=parseFloat(state.discount)||0;
        const total=Math.max(0,subtotal-disc);
        const paidN=parseFloat(state.paid)||0;
        const change=paidN-total;
        const invNum=genInv();
        const invoice={ invNum, type:"sale", date:new Date().toISOString(),
          items:state.cart.map(i=>({...i})), subtotal, discount:disc, total, paid:paidN, change, createdAt:Date.now() };
        await addDoc(collection(db,"invoices"),invoice);
        for(const item of state.cart){
          const prod=state.products.find(p=>p.id===item.productId);
          if(!prod) continue;
          const nv=(prod.variants||[]).map(v=>v.color===item.color&&v.size===item.size?{...v,qty:Math.max(0,v.qty-item.qty)}:v);
          await updateDoc(doc(db,"products",item.productId),{variants:nv});
        }
        const saved={...invoice};
        state.cart=[]; state.discount=""; state.paid=""; state.saving=false;
        state.modal={type:"receipt", data:saved};
        render();
      }catch(e){ toast("❌ "+e.message); state.saving=false; render(); }
    };

    /* ═══════════════════════════════════════════
       INVOICES SCREEN
    ═══════════════════════════════════════════ */
    async function loadInvoices(){
      const snap = await getDocs(collection(db,"invoices"));
      state.invoices = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt-a.createdAt);
      render();
    }

    function renderInvoices(){
      const f = state.invFilter;
      let list = state.invoices;
      if(f.type!=="all") list=list.filter(i=>i.type===f.type);
      if(f.dateFrom) list=list.filter(i=>i.date>=f.dateFrom);
      if(f.dateTo)   list=list.filter(i=>i.date<=f.dateTo+"T23:59:59");
      if(f.searchTerm) list=list.filter(i=>i.invNum?.includes(f.searchTerm));
      const PAGE=15, page=state.invPage||1;
      const total=list.length, pages=Math.ceil(total/PAGE);
      const paged=list.slice((page-1)*PAGE,page*PAGE);

      return `
      <div class="screen">
        <div class="card mb-12">
          <div class="grid-2" style="margin-bottom:10px">
            <input class="inp" placeholder="بحث برقم الفاتورة..." value="${escHtml(f.searchTerm)}" oninput="invFilter('searchTerm',this.value)"/>
            <select class="inp" onchange="invFilter('type',this.value)">
              <option value="all" ${f.type==="all"?"selected":""}>كل الأنواع</option>
              <option value="sale" ${f.type==="sale"?"selected":""}>مبيعات</option>
              <option value="return" ${f.type==="return"?"selected":""}>مرتجعات</option>
            </select>
          </div>
          <div class="grid-2">
            <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">من تاريخ</label>
              <input class="inp" type="date" value="${f.dateFrom}" onchange="invFilter('dateFrom',this.value)"/></div>
            <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">إلى تاريخ</label>
              <input class="inp" type="date" value="${f.dateTo}" onchange="invFilter('dateTo',this.value)"/></div>
          </div>
          <div class="flex-between mt-12">
            <span class="text-muted">${total} فاتورة</span>
            <button class="btn btn-ghost btn-sm" onclick="loadInvoices()">🔄 تحديث</button>
          </div>
        </div>
        ${paged.map(inv=>`
          <div class="card mb-8" style="cursor:pointer" onclick="showInvoiceDetail('${inv.id}')">
            <div class="flex-between">
              <div>
                <div class="fw-700">${escHtml(inv.invNum)}</div>
                <div class="text-muted">${inv.date?new Date(inv.date).toLocaleString("ar-EG"):""}</div>
              </div>
              <div style="text-align:left">
                <span class="badge ${inv.type==="sale"?"badge-green":"badge-red"}">${inv.type==="sale"?"بيع":"مرتجع"}</span>
                <div class="font-mono text-accent fw-700 mt-8">${fmt(inv.total||inv.returnTotal||0)}</div>
              </div>
            </div>
          </div>`).join("")}
        ${pages>1?`
          <div class="flex-between mt-12" style="gap:8px">
            <button class="btn btn-ghost btn-sm" ${page<=1?"disabled":""} onclick="invSetPage(${page-1})">⬅ السابق</button>
            <span class="text-muted">${page} / ${pages}</span>
            <button class="btn btn-ghost btn-sm" ${page>=pages?"disabled":""} onclick="invSetPage(${page+1})">التالي ➡</button>
          </div>`:""}
      </div>`;
    }

    window.invFilter  = (k,v) => { state.invFilter[k]=v; state.invPage=1; render(); };
    window.invSetPage = (p) => { state.invPage=p; render(); };
    window.showInvoiceDetail = (id) => {
      const inv = state.invoices.find(i=>i.id===id);
      if(!inv) return;
      state.modal={type:"invoiceDetail", data:inv};
      render();
    };
    window.loadInvoices = loadInvoices;

    /* ═══════════════════════════════════════════
       RETURNS SCREEN
    ═══════════════════════════════════════════ */
    function renderReturns(){
      const {returnStep, returnInvoice, returnSelected, returnNewItems, returnPin} = state;
      const retItems = returnInvoice?returnInvoice.items.filter((_,i)=>returnSelected.includes(i)):[];
      const retTotal = retItems.reduce((s,i)=>s+i.total,0);
      const newTotal = returnNewItems.reduce((s,i)=>s+i.total,0);
      const diff = retTotal-newTotal;

      return `<div class="screen">
        ${returnStep==="search"?`
          <div class="card">
            <div class="section-title">↩️ البحث عن فاتورة للمرتجع</div>
            <div class="field"><label>رقم الفاتورة</label>
              <input class="inp" placeholder="INV-2025-XXXXXX" id="retInvInput" value="${escHtml(state.invSearch||"")}" oninput="state.invSearch=this.value" onkeydown="if(event.key==='Enter')searchReturnInv()"/>
            </div>
            <button class="btn btn-primary btn-block" onclick="searchReturnInv()">بحث</button>
          </div>
        `:""}
        ${returnStep==="review"&&returnInvoice?`
          <div>
            <div class="card mb-12">
              <div class="flex-between mb-8">
                <div><div class="fw-700">${returnInvoice.invNum}</div>
                  <div class="text-muted">${new Date(returnInvoice.date).toLocaleString("ar-EG")}</div></div>
                <button class="btn btn-ghost btn-sm" onclick="setState({returnStep:'search',returnInvoice:null,returnSelected:[],returnNewItems:[]})">⬅ رجوع</button>
              </div>
              <div class="section-title">اختار القطع المرتجعة</div>
              ${returnInvoice.items.map((item,i)=>`
                <div class="cart-item" style="cursor:pointer;opacity:${returnSelected.includes(i)?1:0.6}" onclick="toggleReturnItem(${i})">
                  <div style="width:22px;height:22px;border-radius:4px;border:2px solid var(--border);background:${returnSelected.includes(i)?"var(--accent)":"transparent"};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#000;font-size:12px;font-weight:700">
                    ${returnSelected.includes(i)?"✓":""}
                  </div>
                  <div class="cart-item-info">
                    <div class="cart-item-name">${escHtml(item.name)}</div>
                    <div class="cart-item-meta">${escHtml(item.color)} · ${escHtml(item.size)} · ×${item.qty}</div>
                  </div>
                  <div class="cart-item-price">${fmt(item.total)}</div>
                </div>`).join("")}
              ${retItems.length>0?`
                <div class="divider"></div>
                <div class="total-row"><span class="total-label">إجمالي المرتجع</span><span class="total-val text-red">${fmt(retTotal)}</span></div>
              `:""}
            </div>
            ${retItems.length>0?`
              <div class="card mb-12">
                <div class="section-title">💱 تبديل بمنتج آخر (اختياري)</div>
                ${returnNewItems.map((item,i)=>`
                  <div class="cart-item">
                    <button class="btn btn-ghost btn-icon btn-sm" onclick="removeReturnNew(${i})">✕</button>
                    <div class="cart-item-info"><div class="cart-item-name">${escHtml(item.name)}</div>
                      <div class="cart-item-meta">${escHtml(item.color)} · ${escHtml(item.size)}</div></div>
                    <div class="cart-item-price">${fmt(item.total)}</div>
                  </div>`).join("")}
                <button class="btn btn-ghost btn-sm btn-block mt-8" onclick="openReturnNewModal()">+ إضافة منتج للتبديل</button>
                ${newTotal>0?`<div class="total-row mt-8"><span class="total-label">إجمالي التبديل</span><span class="total-val text-accent">${fmt(newTotal)}</span></div>`:""}
                ${diff>=0?`<div class="alert alert-green mt-8">💰 المبلغ المسترجع: ${fmt(diff)}</div>`:`<div class="alert alert-yellow mt-8">💳 المبلغ المطلوب: ${fmt(-diff)}</div>`}
              </div>
              <div class="card mb-12">
                <div class="section-title">🔒 تأكيد بالباسورد</div>
                <input class="inp" type="password" placeholder="أدخل الباسورد" value="${returnPin}" oninput="state.returnPin=this.value;render()"/>
                <button class="btn btn-danger btn-block mt-12" onclick="confirmReturn()" ${state.saving?"disabled":""}>
                  ${state.saving?"⏳ جاري...":"✅ تأكيد المرتجع"}
                </button>
              </div>
            `:""}
          </div>
        `:""}
      </div>`;
    }

    window.toggleReturnItem = (i) => {
      const s=state.returnSelected;
      state.returnSelected = s.includes(i)?s.filter(j=>j!==i):[...s,i];
      render();

      const val=(state.invSearch||"").trim().toUpperCase();
      if(!val) return;
      const q=query(collection(db,"invoices"),where("invNum","==",val));
      const snap=await getDocs(q);
      if(snap.empty){ toast("❌ الفاتورة مش موجودة"); return; }
      const inv={id:snap.docs[0].id,...snap.docs[0].data()};
      if(inv.type!=="sale"){ toast("❌ دي مش فاتورة بيع"); return; }
      state.returnInvoice=inv; state.returnSelected=[]; state.returnNewItems=[]; state.returnStep="review";
      render();
    };
    window.confirmReturn = async () => {
      const {returnInvoice,returnSelected,returnNewItems,returnPin} = state;
      const stored=state.settings.password||"1234";
      if(returnPin!==stored){ toast("❌ باسورد غلط"); return; }
      const retItems=returnInvoice.items.filter((_,i)=>returnSelected.includes(i));
      if(!retItems.length){ toast("⚠️ اختار قطع المرتجع"); return; }
      state.saving=true; render();
      try{
        for(const item of retItems){
          const prod=state.products.find(p=>p.id===item.productId);
          if(!prod) continue;
          const nv=(prod.variants||[]).map(v=>v.color===item.color&&v.size===item.size?{...v,qty:v.qty+item.qty}:v);
          await updateDoc(doc(db,"products",item.productId),{variants:nv});
        }
        for(const item of returnNewItems){
          const prod=state.products.find(p=>p.id===item.productId);
          if(!prod) continue;
          const nv=(prod.variants||[]).map(v=>v.color===item.color&&v.size===item.size?{...v,qty:Math.max(0,v.qty-item.qty)}:v);
          await updateDoc(doc(db,"products",item.productId),{variants:nv});
        }
        const retTotal=retItems.reduce((s,i)=>s+i.total,0);
        const newTotal=returnNewItems.reduce((s,i)=>s+i.total,0);
        await addDoc(collection(db,"invoices"),{
          invNum:genInv(), type:"return", date:new Date().toISOString(),
          refInv:returnInvoice.invNum, returnedItems:retItems, newItems:returnNewItems,
          returnTotal:retTotal, newTotal, diff:retTotal-newTotal, createdAt:Date.now()
        });
        toast("✅ تم تسجيل المرتجع");
        state.returnStep="search"; state.returnInvoice=null; state.returnSelected=[]; state.returnNewItems=[]; state.returnPin=""; state.invSearch=""; state.saving=false;
        render();
      }catch(e){ toast("❌ "+e.message); state.saving=false; render(); }
    };

    async function loadReport(){
      state.reportLoading=true; render();
      try{
        const snap=await getDocs(collection(db,"invoices"));
        const all=snap.docs.map(d=>d.data());
        const now=new Date();
        const todayStr=today();
        const weekAgo=new Date(now-7*864e5).toISOString().split("T")[0];
        const monthStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

        function calcRange(list){
          const sales=list.filter(i=>i.type==="sale");
          const rets=list.filter(i=>i.type==="return");
          return {
            salesCount:sales.length, salesTotal:sales.reduce((s,i)=>s+(i.total||0),0),
            retsCount:rets.length, retsTotal:rets.reduce((s,i)=>s+(i.returnTotal||0),0),
            net:sales.reduce((s,i)=>s+(i.total||0),0)-rets.reduce((s,i)=>s+(i.returnTotal||0),0),
            items:sales.reduce((s,i)=>s+(i.items||[]).reduce((a,it)=>a+it.qty,0),0),
          };
        }

        const todayInvs=all.filter(i=>i.date?.startsWith(todayStr));
        const weekInvs=all.filter(i=>i.date>=weekAgo);
        const monthInvs=all.filter(i=>i.date?.startsWith(monthStr));

        // Daily breakdown for chart (last 7 days)
        const dailyMap={};
        for(let d=0;d<7;d++){
          const dt=new Date(now-d*864e5).toISOString().split("T")[0];
          dailyMap[dt]=0;
        }
        all.filter(i=>i.type==="sale"&&i.date>=weekAgo).forEach(i=>{
          const dt=i.date?.split("T")[0];
          if(dt in dailyMap) dailyMap[dt]+=(i.total||0);
        });
        const dailyLabels=Object.keys(dailyMap).sort();
        const dailyVals=dailyLabels.map(k=>dailyMap[k]);

        // Top products
        const prodMap={};
        all.filter(i=>i.type==="sale").forEach(inv=>(inv.items||[]).forEach(it=>{
          if(!prodMap[it.name]) prodMap[it.name]=0;
          prodMap[it.name]+=it.qty;
        }));
        const topProds=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

        state.reportData={ today:calcRange(todayInvs), week:calcRange(weekInvs), month:calcRange(monthInvs), dailyLabels, dailyVals, topProds };
      }catch(e){ toast("❌ "+e.message); }
      state.reportLoading=false; render();
    }
    window.loadReport = loadReport;

    function renderBarChart(labels, vals){
      if(!labels||!labels.length) return "";
      const maxVal=Math.max(...vals,1);
      const barW=Math.floor(100/labels.length);
      return `<div style="display:flex;align-items:flex-end;height:120px;gap:4px;padding:0 4px">
        ${vals.map((v,i)=>{
          const h=Math.round((v/maxVal)*100);
          const label=labels[i]?.slice(5)||"";
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:9px;color:var(--muted)">${v>0?Math.round(v)+"":""}</div>
            <div style="width:100%;background:var(--accent);border-radius:4px 4px 0 0;height:${h}%;min-height:${v>0?4:0}px;transition:height 0.3s"></div>
            <div style="font-size:9px;color:var(--muted);white-space:nowrap">${label}</div>
          </div>`;
        }).join("")}
      </div>`;
    }

          <div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:12px">
            <div class="grid-3" style="margin-bottom:8px">
              <select class="inp" id="pm_nc" onchange="state.modal.data.newColor=this.value">
                <option value="">اللون</option>
                ${COLORS.map(c=>`<option>${c}</option>`).join("")}
              </select>
              <select class="inp" id="pm_ns" onchange="state.modal.data.newSize=this.value">
                <option value="">المقاس</option>
                ${SIZES.map(s=>`<option>${s}</option>`).join("")}
              </select>
              <input class="inp" type="number" id="pm_nq" placeholder="الكمية" oninput="state.modal.data.newQty=this.value"/>
            </div>
            <button class="btn btn-ghost btn-sm btn-block" onclick="pmAddVariant()">+ إضافة مقاس/لون</button>
          </div>
          <div style="max-height:180px;overflow-y:auto">
            ${d.variants.map((v,i)=>`
              <div class="cart-item" style="margin-bottom:6px">
                <div class="cart-item-info"><div class="cart-item-name">${v.color} / ${v.size}</div></div>
                <input class="inp" type="number" value="${v.qty}" style="width:70px;text-align:center" onchange="state.modal.data.variants[${i}].qty=Math.max(0,parseInt(this.value)||0)"/>
                <button class="btn btn-ghost btn-icon btn-sm" onclick="pmRemoveVariant(${i})">✕</button>
              </div>`).join("")}
          </div>
          <button class="btn btn-primary btn-block mt-12" onclick="saveProduct()" ${state.saving?"disabled":""}>
            ${state.saving?"⏳ جاري الحفظ...":(d.product?"💾 حفظ التعديلات":"➕ إضافة المنتج")}
          </button>
        </div>
      </div>`;
    }

    window.pmAddVariant = () => {
      const d=state.modal.data;
      if(!d.newColor||!d.newSize){ toast("اختار لون ومقاس"); return; }
      if(d.variants.find(v=>v.color===d.newColor&&v.size===d.newSize)){ toast("المقاس ده موجود"); return; }
      d.variants.push({color:d.newColor,size:d.newSize,qty:parseInt(d.newQty)||0});
      d.newColor=""; d.newSize=""; d.newQty="";
      render();
    };
    window.pmRemoveVariant = (i) => { state.modal.data.variants=state.modal.data.variants.filter((_,j)=>j!==i); render(); };
    window.saveProduct = async () => {
      const d=state.modal.data;
      if(!d.name||!d.salePrice){ toast("اسم وسعر البيع مطلوبين"); return; }
      state.saving=true; render();
      try{
        const data={name:d.name,section:d.section,barcode:d.barcode,salePrice:parseFloat(d.salePrice)||0,costPrice:parseFloat(d.costPrice)||0,variants:d.variants};
        if(d.product){ await updateDoc(doc(db,"products",d.product.id),data); toast("✅ تم التعديل"); }
        else { await addDoc(collection(db,"products"),data); toast("✅ تمت الإضافة"); }
        state.modal=null; state.saving=false; render();
      }catch(e){ toast("❌ "+e.message); state.saving=false; render(); }
    };

    function renderReturnNewModal(d){
      const sel=d.sel;
      const colors=sel?[...new Set((sel.variants||[]).map(v=>v.color))]:[];
      const sizes=d.color?[...new Set((sel.variants||[]).filter(v=>v.color===d.color).map(v=>v.size))]:[];
      return `<div class="overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title"><span>اختار منتج للتبديل</span>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
          ${!sel?`
            <input class="inp mb-8" placeholder="بحث..." oninput="rnSearch(this.value)" id="rnSearchInp"/>
            <div style="max-height:240px;overflow-y:auto">
              ${state.products.map(p=>`<div class="product-card" style="margin-bottom:8px" onclick="rnSelect('${p.id}')">
                <div class="product-name">${escHtml(p.name)}</div>
                <div class="product-price">${fmt(p.salePrice)}</div>
              </div>`).join("")}
            </div>
          `:`
            <div class="fw-700 mb-8">${escHtml(sel.name)}</div>
            <div class="field"><label>اللون</label>
              <div class="chips">${colors.map(c=>`<span class="variant-tag ${d.color===c?"selected":""}" onclick="state.modal.data.color='${escHtml(c)}';state.modal.data.size='';render()">${escHtml(c)}</span>`).join("")}</div>
            </div>
            ${d.color?`<div class="field"><label>المقاس</label>
              <div class="chips">${sizes.map(s=>{
                const v=(sel.variants||[]).find(vv=>vv.color===d.color&&vv.size===s);
                return `<span class="variant-tag ${d.size===s?"selected":""} ${(v?.qty||0)===0?"zero":""}" onclick="${(v?.qty||0)>0?`state.modal.data.size='${escHtml(s)}';render()`:""}">
                  ${escHtml(s)}</span>`;
              }).join("")}</div>
            </div>`:""}
            <div class="grid-2 mt-12">
              <button class="btn btn-ghost" onclick="state.modal.data.sel=null;state.modal.data.color='';state.modal.data.size='';render()">رجوع</button>
              <button class="btn btn-primary" ${!d.color||!d.size?"disabled":""} onclick="rnAdd()">إضافة</button>
            </div>
          `}
        </div>
      </div>`;
    }

    window.rnSelect = (id) => {
      const p=state.products.find(pp=>pp.id===id);
      if(!p) return;
      state.modal.data.sel=p; state.modal.data.color=""; state.modal.data.size=""; render();
    };
    window.rnAdd = () => {
      const {sel,color,size}=state.modal.data;
      const v=(sel.variants||[]).find(vv=>vv.color===color&&vv.size===size);
      if(!v||v.qty<=0){ toast("❌ المقاس ده خلص"); return; }
      state.returnNewItems=[...state.returnNewItems,{productId:sel.id,name:sel.name,color,size,qty:1,price:sel.salePrice,total:sel.salePrice,maxQty:v.qty}];
      state.modal=null; render();
    };

    function renderInvoiceDetailModal(inv){
      const items = inv.items||inv.returnedItems||[];
      return `<div class="overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">
            <span>${inv.invNum}</span>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
          </div>
          <div class="flex-between mb-8">
            <span class="badge ${inv.type==="sale"?"badge-green":"badge-red"}">${inv.type==="sale"?"بيع":"مرتجع"}</span>
            <span class="text-muted">${new Date(inv.date).toLocaleString("ar-EG")}</span>
          </div>
          ${items.map(i=>`<div class="total-row">
            <span class="text-muted">${escHtml(i.name)} (${escHtml(i.color||"")}/${escHtml(i.size||"")}) ×${i.qty}</span>
            <span class="font-mono">${fmt(i.total)}</span>
          </div>`).join("")}
          <div class="divider"></div>
          ${inv.discount>0?`<div class="total-row"><span class="text-muted">خصم</span><span class="font-mono text-red">-${fmt(inv.discount)}</span></div>`:""}
          <div class="total-row main"><span>الإجمالي</span><span>${fmt(inv.total||inv.returnTotal||0)}</span></div>
          ${inv.paid!=null?`<div class="total-row"><span class="text-muted">المدفوع</span><span class="font-mono">${fmt(inv.paid)}</span></div>`:""}
          <div class="grid-2 mt-12">
            <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
            <button class="btn btn-primary" onclick="printReceipt(${JSON.stringify(inv).replace(/"/g,'&quot;')}, '${escHtml(state.settings.storeName)}')">🖨️ طباعة</button>
          </div>
        </div>
      </div>`;
    }

    window.closeModal  = () => { state.modal=null; render(); };

    /* ═══════════════════════════════════════════
       PRINT RECEIPT
    ═══════════════════════════════════════════ */
    window.printReceipt = (inv, storeName) => {
      const items=inv.items||inv.returnedItems||[];
      const win=window.open("","_blank","width=420,height=700");
      win.document.write(`<!DOCTYPE html><html dir="rtl"><head><title>فاتورة ${inv.invNum}</title>
      <style>
        body{font-family:monospace;font-size:13px;max-width:58mm;margin:0 auto;padding:6px;direction:rtl}
        .c{text-align:center}.b{font-weight:bold}.l{border-top:1px dashed #000;margin:6px 0}
        .r{display:flex;justify-content:space-between}.big{font-size:16px;font-weight:bold}
        @media print{@page{margin:4mm}}
      </style></head><body>
      <div class="c b" style="font-size:16px">${storeName}</div>
      <div class="c">${state.settings.storeAddress||""}</div>
      <div class="c">${state.settings.storePhone||""}</div>
      <div class="l"></div>
      <div class="c b">#${inv.invNum}</div>
      <div class="c">${nowStr()}</div>
      <div class="c">${inv.type==="return"?"فاتورة مرتجع":"فاتورة مبيعات"}</div>
      <div class="l"></div>
      ${items.map(i=>`<div class="r"><span>${i.name} (${i.color}/${i.size})</span></div>
      <div class="r"><span>${i.qty} × ${(+i.price||0).toFixed(2)}</span><span>${(+i.total||0).toFixed(2)}</span></div>`).join("")}
      <div class="l"></div>
      ${inv.discount>0?`<div class="r"><span>خصم</span><span>${(+inv.discount).toFixed(2)}</span></div>`:""}
      <div class="r big"><span>الإجمالي</span><span>${(+(inv.total||inv.returnTotal||0)).toFixed(2)} ج</span></div>
      ${inv.paid!=null?`<div class="r"><span>المدفوع</span><span>${(+inv.paid).toFixed(2)} ج</span></div>`:""}
      ${inv.change!=null?`<div class="r"><span>الباقي</span><span>${(+inv.change).toFixed(2)} ج</span></div>`:""}
      <div class="l"></div>
      <div class="c">شكراً لزيارتكم ❤️</div>
      </body></html>`);
      win.document.close();
      win.focus();
      setTimeout(()=>win.print(),300);
    };

    /* ═══════════════════════════════════════════
       BARCODE SCANNER
    ═══════════════════════════════════════════ */
    let barcodeBuffer="", barcodeTimer2;
    document.addEventListener("keydown", e=>{
      const active=document.activeElement;
      if(active&&active.tagName==="INPUT"&&active.id!=="posSearch") return;
      if(e.key==="Enter"){
        if(barcodeBuffer.length>3) handleBarcode(barcodeBuffer);
        barcodeBuffer=""; return;
      }
      if(e.key.length===1){ barcodeBuffer+=e.key; clearTimeout(barcodeTimer2); barcodeTimer2=setTimeout(()=>{barcodeBuffer="";},120); }
    });

    function handleBarcode(code){
      if(state.screen!=="pos") return;
      const prod=state.products.find(p=>p.barcode===code||(p.variants||[]).some(v=>v.barcode===code));
      if(!prod){ toast("❌ الباركود مش موجود"); return; }
      const variant=(prod.variants||[]).find(v=>v.barcode===code);
      if(variant){ addToCartDirect(prod,variant.color,variant.size); }
      else { openVariantModal(prod.id); }
    }

    function addToCartDirect(prod,color,size){
      const v=(prod.variants||[]).find(vv=>vv.color===color&&vv.size===size);
      if(!v||v.qty<=0){ toast("❌ المقاس ده خلص"); return; }
      const idx=state.cart.findIndex(i=>i.productId===prod.id&&i.color===color&&i.size===size);
      if(idx>=0){
        if(state.cart[idx].qty>=v.qty){ toast("⚠️ الكمية المتاحة "+v.qty); return; }
        state.cart=state.cart.map((i,j)=>j===idx?{...i,qty:i.qty+1,total:i.price*(i.qty+1)}:i);
      } else {
        state.cart=[...state.cart,{productId:prod.id,name:prod.name,color,size,price:prod.salePrice,qty:1,total:prod.salePrice,maxQty:v.qty}];
      }
      toast("✅ "+prod.name);
    }

    /* ═══════════════════════════════════════════
       PWA INSTALL
    ═══════════════════════════════════════════ */
    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", e=>{
      e.preventDefault(); deferredPrompt=e;
      const btn=document.getElementById("installBtn");
      if(btn){ btn.style.display="block"; }
    });
    window.installPWA = async () => {
      if(!deferredPrompt){ const n=document.getElementById("installNote"); if(n)n.style.display="block"; return; }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt=null;
    };

    /* ═══════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════ */
    function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    function render(){
      const root=document.getElementById("root");
      if(!root) return;
      if(!state.authed){ root.innerHTML=renderLogin(); return; }
      if(state.loading){ root.innerHTML=`<div class="flex-center" style="height:100vh"><div class="spinner"></div></div>`; return; }

      let content="";
      if(state.screen==="pos")       content=renderPOS();
      else if(state.screen==="invoices")  content=renderInvoices();
      else if(state.screen==="returns")   content=renderReturns();
      else if(state.screen==="inventory") content=renderInventory();
      else if(state.screen==="reports")   content=renderReports();
      else if(state.screen==="settings")  content=renderSettings();

      root.innerHTML=`
        <div class="app">
          ${renderHeader()}
          <div class="content">${content}</div>
          ${renderModal()}
          ${state.toast?`<div class="toast">${escHtml(state.toast)}</div>`:""}
        </div>`;

      // Show install button if available
      if(deferredPrompt){
        const btn=document.getElementById("installBtn");
        if(btn) btn.style.display="block";
      }
    }

    // Initial render
    render();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f11; --surface: #1a1a1f; --surface2: #222228; --border: #2e2e38;
      --accent: #f5c842; --accent2: #ff6b35; --green: #22c55e; --red: #ef4444;

      --font-ar: 'IBM Plex Sans Arabic', sans-serif; --font-mono: 'Space Mono', monospace;

    .nav::-webkit-scrollbar { display: none; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 16px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: var(--font-ar); font-size: 11px; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-btn:hover:not(.active) { color: var(--text); }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover:not(:disabled) { background: #f0bc20; }

    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-block { width: 100%; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 8px; }
    .pos-layout { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 768px) { .pos-layout { grid-template-columns: 1fr 380px; } }

    .product-price { font-family: var(--font-mono); font-size: 14px; color: var(--accent); font-weight: 700; }
    .product-section { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
